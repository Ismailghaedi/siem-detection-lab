title: LSASS Process Memory Access by Suspicious Tool
id: a944f972-bbb2-4941-88d0-31abd59f57ca
status: experimental
description: >
  Detects a process opening a handle to lsass.exe with access rights that allow
  reading process memory. This is the core behaviour behind credential dumping
  tools like Mimikatz, which read cleartext credentials and hashes straight out
  of LSASS. Relies on Sysmon Event ID 10 (ProcessAccess).
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://learn.microsoft.com/en-us/sysinternals/downloads/sysmon
author: Ismail Masoumabadi
date: 2026/06/26
tags:
  - attack.credential_access
  - attack.t1003.001
logsource:
  category: process_access
  product: windows
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess|contains:
      - '0x1010'   # PROCESS_VM_READ | PROCESS_QUERY_INFORMATION
      - '0x1410'
      - '0x1438'
      - '0x143a'
      - '0x1fffff'  # PROCESS_ALL_ACCESS
  filter_known_good:
    SourceImage|endswith:
      - '\MsMpEng.exe'        # Defender
      - '\wininit.exe'
      - '\csrss.exe'
      - '\taskmgr.exe'
  condition: selection and not filter_known_good
falsepositives:
  - Endpoint protection and backup agents that legitimately read process memory
  - Performance and crash dump tooling
level: high
